<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saved Snake</title>
  <style>
    :root {
      --bg: #0d1017;
      --panel: #171b26;
      --line: #2a3143;
      --text: #f6f7fb;
      --muted: #aeb6c9;
      --accent: #5cf2a8;
      --danger: #ff6b7a;
      --food: #ffd166;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .game {
      width: min(94vw, 720px);
      display: grid;
      gap: 14px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
    }

    h1 {
      margin: 0;
      font-size: 1rem;
      letter-spacing: 0;
    }

    .stats {
      display: flex;
      gap: 12px;
      color: var(--muted);
      font-size: 0.9rem;
      white-space: nowrap;
    }

    .stats strong {
      color: var(--text);
    }

    canvas {
      width: 100%;
      aspect-ratio: 1;
      display: block;
      background: #090c12;
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }

    button {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--text);
      padding: 10px 14px;
      font: inherit;
      cursor: pointer;
    }

    button:hover {
      border-color: var(--accent);
    }

    .primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #08110d;
      font-weight: 700;
    }

    .danger:hover {
      border-color: var(--danger);
    }

    .status {
      min-height: 20px;
      color: var(--muted);
      text-align: center;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <main class="game">
    <section class="topbar" aria-label="Game status">
      <h1>Saved Snake</h1>
      <div class="stats">
        <span>Score <strong id="score">0</strong></span>
        <span>Best <strong id="best">0</strong></span>
      </div>
    </section>

    <canvas id="board" width="600" height="600" aria-label="Snake board"></canvas>

    <section class="controls" aria-label="Game controls">
      <button class="primary" id="startButton" type="button">Start</button>
      <button id="pauseButton" type="button">Pause</button>
      <button class="danger" id="resetButton" type="button">Reset Save</button>
    </section>

    <div class="status" id="status" aria-live="polite"></div>
  </main>

  <script>
    const saveKey = "xskullx-local-snake-save-v1";
    const board = document.querySelector("#board");
    const ctx = board.getContext("2d");
    const scoreEl = document.querySelector("#score");
    const bestEl = document.querySelector("#best");
    const statusEl = document.querySelector("#status");
    const startButton = document.querySelector("#startButton");
    const pauseButton = document.querySelector("#pauseButton");
    const resetButton = document.querySelector("#resetButton");
    const size = 24;
    const cell = board.width / size;
    const tickMs = 110;

    let state = loadState();
    let timer = null;

    function freshState() {
      return {
        snake: [{ x: 8, y: 12 }, { x: 7, y: 12 }, { x: 6, y: 12 }],
        food: { x: 16, y: 12 },
        direction: { x: 1, y: 0 },
        nextDirection: { x: 1, y: 0 },
        score: 0,
        best: 0,
        running: false,
        gameOver: false
      };
    }

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem(saveKey));
        const base = freshState();
        return saved && Array.isArray(saved.snake) ? { ...base, ...saved, running: false } : base;
      } catch (error) {
        return freshState();
      }
    }

    function saveState() {
      localStorage.setItem(saveKey, JSON.stringify({ ...state, running: false }));
    }

    function draw() {
      ctx.fillStyle = "#090c12";
      ctx.fillRect(0, 0, board.width, board.height);

      ctx.strokeStyle = "#151a25";
      ctx.lineWidth = 1;
      for (let i = 0; i <= size; i++) {
        ctx.beginPath();
        ctx.moveTo(i * cell, 0);
        ctx.lineTo(i * cell, board.height);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, i * cell);
        ctx.lineTo(board.width, i * cell);
        ctx.stroke();
      }

      ctx.fillStyle = "var(--food)";
      drawCell(state.food.x, state.food.y);

      state.snake.forEach((part, index) => {
        ctx.fillStyle = index === 0 ? "var(--accent)" : "#37c887";
        drawCell(part.x, part.y);
      });

      scoreEl.textContent = state.score;
      bestEl.textContent = state.best;
      statusEl.textContent = state.gameOver ? "Game over. Press Start for a new run." : "Progress saves automatically.";
    }

    function drawCell(x, y) {
      ctx.fillRect(x * cell + 2, y * cell + 2, cell - 4, cell - 4);
    }

    function step() {
      if (!state.running || state.gameOver) {
        return;
      }

      state.direction = state.nextDirection;
      const head = state.snake[0];
      const next = {
        x: head.x + state.direction.x,
        y: head.y + state.direction.y
      };

      if (next.x < 0 || next.y < 0 || next.x >= size || next.y >= size || state.snake.some((part) => part.x === next.x && part.y === next.y)) {
        state.gameOver = true;
        state.running = false;
        saveState();
        stopTimer();
        draw();
        return;
      }

      state.snake.unshift(next);

      if (next.x === state.food.x && next.y === state.food.y) {
        state.score += 1;
        state.best = Math.max(state.best, state.score);
        placeFood();
      } else {
        state.snake.pop();
      }

      saveState();
      draw();
    }

    function placeFood() {
      const open = [];
      for (let y = 0; y < size; y++) {
        for (let x = 0; x < size; x++) {
          if (!state.snake.some((part) => part.x === x && part.y === y)) {
            open.push({ x, y });
          }
        }
      }

      state.food = open[Math.floor(Math.random() * open.length)] || { x: 0, y: 0 };
    }

    function startGame() {
      if (state.gameOver) {
        const best = state.best;
        state = freshState();
        state.best = best;
      }

      state.running = true;
      saveState();
      startTimer();
      draw();
    }

    function togglePause() {
      state.running = !state.running;
      saveState();
      state.running ? startTimer() : stopTimer();
      draw();
    }

    function startTimer() {
      stopTimer();
      timer = setInterval(step, tickMs);
    }

    function stopTimer() {
      if (timer) {
        clearInterval(timer);
        timer = null;
      }
    }

    function setDirection(x, y) {
      if (state.direction.x + x === 0 && state.direction.y + y === 0) {
        return;
      }
      state.nextDirection = { x, y };
      saveState();
    }

    function resetSave() {
      localStorage.removeItem(saveKey);
      state = freshState();
      stopTimer();
      draw();
    }

    document.addEventListener("keydown", (event) => {
      const keys = {
        ArrowUp: [0, -1],
        w: [0, -1],
        ArrowDown: [0, 1],
        s: [0, 1],
        ArrowLeft: [-1, 0],
        a: [-1, 0],
        ArrowRight: [1, 0],
        d: [1, 0]
      };

      if (event.key === " ") {
        event.preventDefault();
        togglePause();
        return;
      }

      const direction = keys[event.key];
      if (direction) {
        event.preventDefault();
        setDirection(direction[0], direction[1]);
      }
    });

    startButton.addEventListener("click", startGame);
    pauseButton.addEventListener("click", togglePause);
    resetButton.addEventListener("click", resetSave);
    window.addEventListener("beforeunload", saveState);
    document.addEventListener("visibilitychange", saveState);

    draw();
  </script>
</body>
</html>
