<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saved Snake</title>
  <style>
    :root {
      --bg: #0d1017;
      --panel: #171b26;
      --line: #2a3143;
      --text: #f6f7fb;
      --muted: #aeb6c9;
      --accent: #5cf2a8;
      --danger: #ff6b7a;
      --food: #ffd166;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    body {
      display: grid;
      place-items: center;
      padding: 12px;
    }

    body.embedded {
      padding: 0;
    }

    .game {
      width: min(94vw, 720px);
      max-height: 100%;
      display: grid;
      gap: 14px;
      grid-template-rows: auto 1fr auto auto;
    }

    body.embedded .game {
      width: 100%;
      height: 100%;
      max-width: none;
      padding: 10px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
    }

    h1 {
      margin: 0;
      font-size: 1rem;
      letter-spacing: 0;
    }

    .stats {
      display: flex;
      gap: 12px;
      color: var(--muted);
      font-size: 0.9rem;
      white-space: nowrap;
    }

    .stats strong {
      color: var(--text);
    }

    .board-wrap {
      display: grid;
      place-items: center;
      min-height: 0;
    }

    body.embedded .board-wrap {
      align-content: stretch;
    }

    canvas {
      width: 100%;
      max-width: 600px;
      max-height: 100%;
      aspect-ratio: 1;
      display: block;
      background: #090c12;
      border: 1px solid var(--line);
      border-radius: 8px;
      touch-action: none;
      outline: none;
    }

    body.embedded canvas {
      max-width: min(92vw, 92vh);
      max-height: min(92vw, 92vh);
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }

    button {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--text);
      padding: 10px 14px;
      font: inherit;
      cursor: pointer;
    }

    button:hover {
      border-color: var(--accent);
    }

    .primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #08110d;
      font-weight: 700;
    }

    .danger:hover {
      border-color: var(--danger);
    }

    .status {
      min-height: 20px;
      color: var(--muted);
      text-align: center;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <main class="game">
    <section class="topbar" aria-label="Game status">
      <h1>Saved Snake</h1>
      <div class="stats">
        <span>Score <strong id="score">0</strong></span>
        <span>Best <strong id="best">0</strong></span>
      </div>
    </section>

    <div class="board-wrap">
      <canvas id="board" width="600" height="600" tabindex="0" aria-label="Snake board. Click here then use arrow keys or WASD."></canvas>
    </div>

    <section class="controls" aria-label="Game controls">
      <button class="primary" id="startButton" type="button">Start</button>
      <button id="pauseButton" type="button">Pause</button>
      <button class="danger" id="resetButton" type="button">Reset Save</button>
    </section>

    <div class="status" id="status" aria-live="polite"></div>
  </main>

  <script>
    const saveKey = "xskullx-local-snake-save-v1";
    const COLORS = {
      background: "#090c12",
      grid: "#151a25",
      food: "#ffd166",
      head: "#5cf2a8",
      body: "#37c887"
    };
    const board = document.querySelector("#board");
    const ctx = board.getContext("2d");
    const scoreEl = document.querySelector("#score");
    const bestEl = document.querySelector("#best");
    const statusEl = document.querySelector("#status");
    const startButton = document.querySelector("#startButton");
    const pauseButton = document.querySelector("#pauseButton");
    const resetButton = document.querySelector("#resetButton");
    const size = 24;
    const tickMs = 110;
    const embedded = window.self !== window.top;

    let cell = board.width / size;
    let state = loadState();
    let timer = null;

    if (embedded) {
      document.body.classList.add("embedded");
      statusEl.textContent = "Click the board or Start, then use arrow keys or WASD.";
    }

    window.addEventListener("message", (event) => {
      if (event.data?.source === "xskullx-reload-save") {
        reloadFromStorage();
      }
    });

    function reloadFromStorage() {
      stopTimer();
      state = loadState();
      draw();
      setStatus();
    }

    function freshState() {
      return {
        snake: [{ x: 8, y: 12 }, { x: 7, y: 12 }, { x: 6, y: 12 }],
        food: { x: 16, y: 12 },
        direction: { x: 1, y: 0 },
        nextDirection: { x: 1, y: 0 },
        score: 0,
        best: 0,
        running: false,
        gameOver: false
      };
    }

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem(saveKey));
        const base = freshState();
        return saved && Array.isArray(saved.snake) ? { ...base, ...saved, running: false } : base;
      } catch (error) {
        return freshState();
      }
    }

    function saveState() {
      try {
        localStorage.setItem(saveKey, JSON.stringify({ ...state, running: false }));
      } catch (error) {
        // Storage may be blocked in private mode or restrictive embeds.
      }
    }

    function setStatus() {
      if (state.gameOver) {
        statusEl.textContent = "Game over. Press Start for a new run.";
        return;
      }

      if (state.running) {
        statusEl.textContent = "Playing — progress saves automatically.";
        return;
      }

      statusEl.textContent = embedded
        ? "Click the board or Start, then use arrow keys or WASD."
        : "Press Start, then use arrow keys or WASD. Progress saves automatically.";
    }

    function focusBoard() {
      board.focus({ preventScroll: true });
    }

    function resizeCanvas() {
      const rect = board.getBoundingClientRect();
      const pixels = Math.max(300, Math.floor(Math.min(rect.width, rect.height) || 600));
      if (board.width !== pixels) {
        board.width = pixels;
        board.height = pixels;
        cell = board.width / size;
      }
    }

    function draw() {
      resizeCanvas();

      ctx.fillStyle = COLORS.background;
      ctx.fillRect(0, 0, board.width, board.height);

      ctx.strokeStyle = COLORS.grid;
      ctx.lineWidth = 1;
      for (let i = 0; i <= size; i++) {
        ctx.beginPath();
        ctx.moveTo(i * cell, 0);
        ctx.lineTo(i * cell, board.height);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, i * cell);
        ctx.lineTo(board.width, i * cell);
        ctx.stroke();
      }

      ctx.fillStyle = COLORS.food;
      drawCell(state.food.x, state.food.y);

      state.snake.forEach((part, index) => {
        ctx.fillStyle = index === 0 ? COLORS.head : COLORS.body;
        drawCell(part.x, part.y);
      });

      scoreEl.textContent = state.score;
      bestEl.textContent = state.best;
      setStatus();
    }

    function drawCell(x, y) {
      ctx.fillRect(x * cell + 2, y * cell + 2, cell - 4, cell - 4);
    }

    function step() {
      if (!state.running || state.gameOver) {
        return;
      }

      state.direction = state.nextDirection;
      const head = state.snake[0];
      const next = {
        x: head.x + state.direction.x,
        y: head.y + state.direction.y
      };

      if (next.x < 0 || next.y < 0 || next.x >= size || next.y >= size || state.snake.some((part) => part.x === next.x && part.y === next.y)) {
        state.gameOver = true;
        state.running = false;
        saveState();
        stopTimer();
        draw();
        return;
      }

      state.snake.unshift(next);

      if (next.x === state.food.x && next.y === state.food.y) {
        state.score += 1;
        state.best = Math.max(state.best, state.score);
        placeFood();
      } else {
        state.snake.pop();
      }

      saveState();
      draw();
    }

    function placeFood() {
      const open = [];
      for (let y = 0; y < size; y++) {
        for (let x = 0; x < size; x++) {
          if (!state.snake.some((part) => part.x === x && part.y === y)) {
            open.push({ x, y });
          }
        }
      }

      state.food = open[Math.floor(Math.random() * open.length)] || { x: 0, y: 0 };
    }

    function startGame() {
      if (state.gameOver) {
        const best = state.best;
        state = freshState();
        state.best = best;
      }

      state.running = true;
      saveState();
      focusBoard();
      startTimer();
      draw();
    }

    function togglePause() {
      state.running = !state.running;
      saveState();
      if (state.running) {
        focusBoard();
        startTimer();
      } else {
        stopTimer();
      }
      draw();
    }

    function startTimer() {
      stopTimer();
      timer = setInterval(step, tickMs);
    }

    function stopTimer() {
      if (timer) {
        clearInterval(timer);
        timer = null;
      }
    }

    function setDirection(x, y) {
      if (state.direction.x + x === 0 && state.direction.y + y === 0) {
        return;
      }
      state.nextDirection = { x, y };
      saveState();
    }

    function resetSave() {
      localStorage.removeItem(saveKey);
      state = freshState();
      stopTimer();
      focusBoard();
      draw();
    }

    function handleKeydown(event) {
      const keys = {
        ArrowUp: [0, -1],
        w: [0, -1],
        W: [0, -1],
        ArrowDown: [0, 1],
        s: [0, 1],
        S: [0, 1],
        ArrowLeft: [-1, 0],
        a: [-1, 0],
        A: [-1, 0],
        ArrowRight: [1, 0],
        d: [1, 0],
        D: [1, 0]
      };

      if (event.key === " ") {
        event.preventDefault();
        togglePause();
        return;
      }

      const direction = keys[event.key];
      if (direction) {
        event.preventDefault();
        if (!state.running && !state.gameOver) {
          startGame();
        }
        setDirection(direction[0], direction[1]);
      }
    }

    document.addEventListener("keydown", handleKeydown);
    board.addEventListener("pointerdown", focusBoard);
    board.addEventListener("keydown", handleKeydown);
    startButton.addEventListener("click", startGame);
    pauseButton.addEventListener("click", togglePause);
    resetButton.addEventListener("click", resetSave);
    window.addEventListener("beforeunload", saveState);
    window.addEventListener("pagehide", saveState);
    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "hidden") {
        saveState();
      }
    });
    window.addEventListener("resize", draw);

    draw();
    if (!embedded) {
      focusBoard();
    }
  </script>
</body>
</html>
